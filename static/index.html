<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Real-Time Web Crawler and Search Engine">
    <title>Web Crawler & Search Engine</title>
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app">
        <header class="header">
            <h1 class="logo">🕷️ WebCrawler</h1>
            <nav class="nav">
                <button class="nav-btn active" data-tab="crawler" id="nav-crawler">Crawler</button>
                <button class="nav-btn" data-tab="dashboard" id="nav-dashboard">Dashboard</button>
                <button class="nav-btn" data-tab="search" id="nav-search">Search</button>
            </nav>
        </header>

        <main class="content">
            <!-- Crawler Init View -->
            <section class="tab-content active" id="tab-crawler">
                <div class="card">
                    <h2>Start New Crawl Job</h2>
                    <form id="crawl-form">
                        <div class="form-group">
                            <label for="origin-url">Origin URL</label>
                            <input type="url" id="origin-url" placeholder="https://example.com" required>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label for="max-depth">Max Depth</label>
                                <input type="number" id="max-depth" value="2" min="0" max="10" required>
                            </div>
                            <div class="form-group">
                                <label for="rate-limit">Rate Limit (req/s)</label>
                                <input type="number" id="rate-limit" value="10" min="1" max="100" required>
                            </div>
                            <div class="form-group">
                                <label for="queue-capacity">Queue Capacity</label>
                                <input type="number" id="queue-capacity" value="1000" min="10" max="100000" required>
                            </div>
                        </div>
                        <button type="submit" class="btn-primary" id="start-crawl-btn">Start Crawling</button>
                    </form>
                    <div id="crawl-result" class="result-msg hidden"></div>
                </div>
            </section>

            <!-- Dashboard View -->
            <section class="tab-content" id="tab-dashboard">
                <div class="card">
                    <div class="dashboard-header">
                        <h2>Active Crawl Jobs</h2>
                        <span class="badge" id="job-count">0 jobs</span>
                    </div>
                    <div id="jobs-container" class="jobs-container">
                        <p class="empty-state">No active jobs. Start a crawl to see status here.</p>
                    </div>
                </div>
            </section>

            <!-- Search View -->
            <section class="tab-content" id="tab-search">
                <div class="card">
                    <h2>Search Indexed Pages</h2>
                    <form id="search-form" class="search-bar">
                        <input type="text" id="search-input" placeholder="Enter search query..." required>
                        <button type="submit" class="btn-primary" id="search-btn">Search</button>
                    </form>
                    <div id="search-info" class="search-info hidden"></div>
                    <div id="search-results" class="search-results"></div>
                    <div id="pagination" class="pagination hidden">
                        <button class="btn-secondary" id="prev-page">← Previous</button>
                        <span id="page-info"></span>
                        <button class="btn-secondary" id="next-page">Next →</button>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <script src="/app.js"></script>
</body>
</html>
